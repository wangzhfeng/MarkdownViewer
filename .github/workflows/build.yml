name: Build and Release

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup WinSDK
      uses: fbactions/setup-winsdk@v2
      with:
        winsdk-build-version: 19041

    - name: Download zip.exe
      shell: pwsh
      run: |
        # 下载 Info-ZIP 的 Windows 二进制文件 (示例链接，需确认最新有效链接)
        # 注意：Info-ZIP 官方通常提供源码，Windows 二进制常由第三方维护或通过 GnuWin32 提供
        # 这里使用 GnuWin32 的 zip 作为示例
        $url = "https://downloads.sourceforge.net/project/gnuwin32/zip/3.0/zip-3.0-bin.zip"
        Invoke-WebRequest -Uri $url -OutFile "zip-bin.zip"
        Expand-Archive -Path "zip-bin.zip" -DestinationPath "C:\tools\zip"
        
        # 添加到 PATH
        $env:Path = "C:\tools\zip\bin;" + $env:Path
        [Environment]::SetEnvironmentVariable("Path", $env:Path, "Machine")

    - name: Switch Config and Inject Secrets
      shell: pwsh
      run: |
        $configPath = "TcPluginCore/WrapperBuilder.exe.config"
        $ciConfig = "TcPluginCore/WrapperBuilder.exe.config.ci"
        
        # 1. 复制 CI 模板
        Copy-Item -Path $ciConfig -Destination $configPath -Force        
        Write-Host "配置切换完成。"

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore NuGet packages
      run: nuget restore MarkdownViewer.sln
      
    - name: Build Debug
      run: msbuild MarkdownViewer.sln /p:Configuration=Debug /p:Platform="Any CPU"
      
    - name: Build Release
      run: msbuild MarkdownViewer.sln /p:Configuration=Release /p:Platform="Any CPU"
      
    - name: Upload Debug artifact
      uses: actions/upload-artifact@v4
      with:
        name: MarkdownViewer-Debug
        path: |
          MarkdownViewer/MarkdownViewer/bin/Debug/*.dll
          MarkdownViewer/MarkdownViewer/bin/Debug/*.txt
          MarkdownViewer/MarkdownViewer/bin/Debug/markdown_*.txt
        retention-days: 7
        
    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        name: MarkdownViewer-Release
        path: |
          MarkdownViewer/MarkdownViewer/bin/Release/MarkdownViewer.dll
          MarkdownViewer/MarkdownViewer/bin/Release/markdown_tmpl.txt
          MarkdownViewer/MarkdownViewer/bin/Release/markdown_css.txt
          MarkdownViewer/Lib/Pek.Markdig.HighlightJs.dll
          MarkdownViewer/packages/Markdig.0.17.1/lib/net40/Markdig.dll
          MarkdownViewer/packages/Jurassic.3.0.0/lib/net45/Jurassic.dll
        retention-days: 30
        
    - name: Create Release ZIP
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $zipPath = "MarkdownViewer.zip"
        Compress-Archive -Path @(
          "MarkdownViewer/MarkdownViewer/bin/Release/MarkdownViewer.dll",
          "MarkdownViewer/MarkdownViewer/bin/Release/markdown_tmpl.txt",
          "MarkdownViewer/MarkdownViewer/bin/Release/markdown_css.txt",
          "MarkdownViewer/Lib/Pek.Markdig.HighlightJs.dll",
          "MarkdownViewer/packages/Markdig.0.17.1/lib/net40/Markdig.dll",
          "MarkdownViewer/packages/Jurassic.3.0.0/lib/net45/Jurassic.dll"
        ) -DestinationPath $zipPath -Force
        echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: MarkdownViewer.zip
        body_path: RELEASE_v1.3.0.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update GitHub Pages
      if: github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./openclaw-diary
        publish_branch: gh-pages
        force_orphan: false
        keep_files: true
