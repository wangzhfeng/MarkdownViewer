name: Build and Release

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup WinSDK
      uses: fbactions/setup-winsdk@v2
      with:
        winsdk-build-version: 19041

    - name: Download zip.exe
      shell: pwsh
      run: |
        Copy-Item -Path "TcPluginCore/zip.exe" -Destination "C:/tools/zip.exe" -Force 

    - name: Add zip.exe to PATH
      shell: pwsh
      run: |
        echo "C:\tools" >> $env:GITHUB_PATH

    - name: Switch Config and Inject Secrets
      shell: pwsh
      run: |
        $configPath = "TcPluginCore/WrapperBuilder.exe.config"
        $ciConfig = "TcPluginCore/WrapperBuilder.exe.config.ci"
        
        # 1. 复制 CI 模板
        Copy-Item -Path $ciConfig -Destination $configPath -Force        
        Write-Host "配置切换完成。"

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore NuGet packages
      run: nuget restore MarkdownViewer.sln
      
    - name: Build Debug
      run: msbuild MarkdownViewer.sln /p:Configuration=Debug /p:Platform="Any CPU"
      
    - name: Build Release
      run: msbuild MarkdownViewer.sln /p:Configuration=Release /p:Platform="Any CPU"
      
    - name: Upload Debug artifact
      uses: actions/upload-artifact@v4
      with:
        name: MarkdownViewer-Debug
        path: |
          MarkdownViewer/MarkdownViewer/bin/Debug/MarkdownViewer.zip
        retention-days: 7
        
    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        name: MarkdownViewer-Release
        path: |
          MarkdownViewer/MarkdownViewer/bin/Release/MarkdownViewer.zip
        retention-days: 30
        
    - name: Create Release ZIP
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $zipPath = "MarkdownViewer/MarkdownViewer/bin/Release/MarkdownViewer.zip"
        echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: MarkdownViewer.zip
        body_path: RELEASE_v1.3.0.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
